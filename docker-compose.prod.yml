services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  postgres:
    image: postgres:15
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file: .env
    restart: always

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file: .env
    restart: always

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file: .env
    restart: always

  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    restart: always

  frontend:
    build: ./frontend
    restart: always

volumes:
  postgres_data:
  redis_data:
