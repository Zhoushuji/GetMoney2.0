services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: leadgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file: .env
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file: .env
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    depends_on:
      - backend
      - redis

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file: .env
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    depends_on:
      - redis

  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
