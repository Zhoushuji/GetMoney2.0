version: "3.9"

x-common-env: &common-env
  env_file: .env
  restart: unless-stopped

services:
  postgres:
    <<: *common-env
    image: postgres:15-alpine
    container_name: leadgen_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-leadgen}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-leadgen}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [leadgen-net]

  redis:
    <<: *common-env
    image: redis:7-alpine
    container_name: leadgen_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [leadgen-net]

  backend:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: leadgen_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
      - playwright_cache:/root/.cache/ms-playwright
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [leadgen-net]

  worker:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: leadgen_worker
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=lead_search,contact_enrich,default
      --max-tasks-per-child=100
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
      - playwright_cache:/root/.cache/ms-playwright
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [leadgen-net]

  beat:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: leadgen_beat
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
    depends_on:
      worker:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [leadgen-net]

  flower:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: leadgen_flower
    command: >
      celery -A app.workers.celery_app.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
      --url_prefix=flower
    ports:
      - "5555:5555"
    depends_on:
      worker:
        condition: service_started
    networks: [leadgen-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: leadgen_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [leadgen-net]

  nginx:
    image: nginx:1.25-alpine
    container_name: leadgen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks: [leadgen-net]

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/redis
  playwright_cache:
  nginx_logs:

networks:
  leadgen-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
